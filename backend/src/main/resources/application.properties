# Server Configuration
server.port=8080

# Profile-based DataSource (H2 as fallback)
spring.datasource.url=jdbc:h2:mem:medcloud;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate & JPA Properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.medcloud.clinic=DEBUG
logging.file.name=logs/medcloud-clinic.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security Configuration
jwt.secret=${JWT_SECRET:NDI0MjQyNDI0MjQyNDI0MjQyNDI0MjQyNDI0MjQyNDI0MjQyNDI0MjQyNDI0Mg==}
jwt.expiration=86400000

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# H2 Console (Development Only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
